# Inngest self-hosted server — for Feature 010 evaluation spike
# Usage: docker-compose -f docker-compose.yml -f docker-compose.inngest.yml up
#
# Adds: inngest-server, redis
# Requires: postgres service from base docker-compose.yml

services:
  inngest-server:
    image: inngest/inngest:v1.17.5
    ports:
      - "127.0.0.1:8288:8288"   # Inngest dev UI + API
    environment:
      INNGEST_EVENT_KEY: ${INNGEST_EVENT_KEY:?INNGEST_EVENT_KEY must be set}
      INNGEST_SIGNING_KEY: ${INNGEST_SIGNING_KEY:?INNGEST_SIGNING_KEY must be set}
      # Connect to existing Postgres for state storage
      # sslmode=prefer used; disable only if your local Postgres truly has no TLS support
      DATABASE_URL: "postgresql://${POSTGRES_USER:-jawn}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-jawn_ai}?sslmode=prefer"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jawn-net
    command: ["start", "--host", "0.0.0.0", "--port", "8288"]

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jawn-net

networks:
  jawn-net:
    external: true
