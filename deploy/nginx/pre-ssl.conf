# Joyus AI — Pre-SSL Nginx Config
# Use this BEFORE certbot has obtained a certificate.
# Install: cp pre-ssl.conf /etc/nginx/sites-available/joyus-ai
# After certbot succeeds, replace with nginx.conf (the full SSL version).

server {
    listen 80;
    server_name ai.zivtech.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Health check (works without TLS)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
    }

    # All other traffic: show a simple message
    location / {
        return 200 'Joyus AI is being configured. TLS certificate pending.\n';
        add_header Content-Type text/plain;
    }
}
