# Joyus AI — Docker Compose (base configuration)
# WARNING: Development defaults only. Change all passwords for production.
# Production overrides: docker-compose.prod.yml

services:
  platform:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.platform
    ports:
      - "3000:3000"
      - "3001:3001"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-jawn}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-jawn_ai}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jawn-net

  playwright:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.playwright
    ports:
      - "3002:3002"
    env_file:
      - path: .env
        required: false
    networks:
      - jawn-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jawn_ai}
      POSTGRES_USER: ${POSTGRES_USER:-jawn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - jawn-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jawn} -d ${POSTGRES_DB:-jawn_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jawn-net:
    driver: bridge

volumes:
  postgres-data:
  memory-data:
