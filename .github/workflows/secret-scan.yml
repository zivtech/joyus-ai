name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip scan when Gitleaks license is not configured
        if: ${{ secrets.GITLEAKS_LICENSE == '' }}
        run: |
          echo "::notice title=Gitleaks skipped::GITLEAKS_LICENSE is not configured; skipping secret scan."

      - uses: gitleaks/gitleaks-action@v2
        if: ${{ secrets.GITLEAKS_LICENSE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
