name: Spec Governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run governance checks (P0 merge gate)
        run: |
          python scripts/spec-governance-check.py
