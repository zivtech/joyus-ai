name: Deploy MCP Server

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'
      - 'joyus-ai-mcp-server/**'
      - 'web-chat/**'
      - '.github/workflows/deploy-mcp.yml'

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PLATFORM_IMAGE: ghcr.io/<org>/joyus-ai-platform
  PLAYWRIGHT_IMAGE: ghcr.io/<org>/joyus-ai-playwright

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Platform image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.platform
          push: true
          tags: |
            ${{ env.PLATFORM_IMAGE }}:latest
            ${{ env.PLATFORM_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Playwright image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.playwright
          push: true
          tags: |
            ${{ env.PLAYWRIGHT_IMAGE }}:latest
            ${{ env.PLAYWRIGHT_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/joyus-ai
            ./deploy/scripts/deploy.sh ${{ github.sha }}

  notify:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy.result }}
          fields: repo,message,commit,author,action,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
