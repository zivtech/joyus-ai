name: Status Consistency

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify status consistency
        run: |
          node scripts/verify-status-consistency.mjs
