name: Governance Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  governance:
    name: Feature 007 Governance Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run governance check (terminal)
        run: python3 scripts/governance-check.py --format terminal

      - name: Run governance check (JSON artifact)
        if: always()
        run: python3 scripts/governance-check.py --format json > governance-results.json

      - name: Upload governance results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-results
          path: governance-results.json
          retention-days: 30

      - name: Post summary to job summary
        if: always()
        run: |
          echo "## Governance Check Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/governance-check.py --format terminal >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Generated by \`scripts/governance-check.py\` — Feature 007 Org-Scale Agentic Governance_" >> "$GITHUB_STEP_SUMMARY"
