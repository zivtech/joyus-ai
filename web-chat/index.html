<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joyus AI — Chat</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Joyus AI</h1>
      <div id="status-indicator" class="status" title="Checking..."></div>
    </header>

    <!-- Login screen -->
    <div id="login-screen">
      <div class="login-box">
        <h2>Sign In</h2>
        <p>Enter your access token to continue.</p>
        <form id="login-form">
          <input type="password" id="token-input" placeholder="Access token" autocomplete="off" required>
          <label class="remember-me">
            <input type="checkbox" id="remember-me" checked> Remember me
          </label>
          <button type="submit">Connect</button>
          <p id="login-error" class="error" hidden></p>
        </form>
      </div>
    </div>

    <!-- Chat screen -->
    <div id="chat-screen" hidden>
      <main id="messages"></main>
      <footer>
        <form id="chat-form">
          <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
          <button type="submit" id="send-btn">Send</button>
        </form>
      </footer>
    </div>
  </div>
  <script src="src/chat.js"></script>
</body>
</html>
